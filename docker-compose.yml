services:
  omega:
    build: .
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OMEGA_HOME: /data/omega
      OMEGA_WORKSPACE: /workspace
    volumes:
      - .:/workspace
      - omega-data:/data/omega
    ports:
      - "8765:8765"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  omega-data:
